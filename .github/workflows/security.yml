name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0; full history is required for commit scanning.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: >-
          docker run --rm
          -v "$PWD:/repo:ro"
          zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          detect --source=/repo --config=/repo/.gitleaks.toml --redact --verbose

  containers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: services/api
          - name: vpn-agent
            context: services/vpn-agent
          - name: admin
            context: apps/admin
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Build image
        run: docker build --tag "nebula/${{ matrix.name }}:scan" "${{ matrix.context }}"
      - name: Trivy filesystem and image scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.72.0@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f image \
            --exit-code 1 --ignore-unfixed --severity HIGH,CRITICAL \
            "nebula/${{ matrix.name }}:scan"
